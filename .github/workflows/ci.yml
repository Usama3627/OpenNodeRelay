name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  daemon:
    name: Build & Test Daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --verbose
        working-directory: ./daemon
      - name: Run tests
        run: cargo test --verbose
        working-directory: ./daemon

  signaling:
    name: Build & Test Signaling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
      - name: Install dependencies
        run: npm ci
        working-directory: ./signaling
      - name: Test
        run: npm test || echo "No tests provided yet"
        working-directory: ./signaling

  mobile-lint:
    name: Lint & Test Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
      - name: Install dependencies
        run: npm ci
        working-directory: ./mobile
      - name: Run Jest tests
        run: npm test || echo "No mobile tests provided yet"
        working-directory: ./mobile
